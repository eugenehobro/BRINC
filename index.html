<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BRINC Playbook — DFR Overview (V1)</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://fonts.cdnfonts.com" crossorigin>
<!-- Manrope = body / display ; Orbitron = primary visual fallback for Conthrax (closest free geometric analogue) ; JetBrains Mono = code/eyebrows -->
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Orbitron:wght@500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<!-- Conthrax (BRINC's actual logo typeface). Loaded from cdnfonts.com which serves it with permissive CORS.
     Falls back through the font-family stack to Orbitron if the network blocks the CDN. -->
<link href="https://fonts.cdnfonts.com/css/conthrax" rel="stylesheet">

<style>
/* ==========================================================
   BRINC PLAYBOOK — wiki / docs design system!
   ========================================================== */

:root {
  --font-display: "Inter Tight", "Helvetica Neue", system-ui, -apple-system, sans-serif;
  --font-sans: "Inter", "Helvetica Neue", system-ui, -apple-system, sans-serif;
  --font-mono: "JetBrains Mono", ui-monospace, "SF Mono", Menlo, monospace;

  --nav-h: 64px;
  --left-w: 296px;
  --left-w-collapsed: 56px;
  --right-w: 280px;

  --r-pill: 999px;
  --r-md: 10px;
  --r-sm: 6px;

  --ease: cubic-bezier(.2,.7,.2,1);
}

/* THEMES — derived from BRINC site */

html[data-theme="dark"] {
  --bg: #000000;
  --accent: #00D2FF;
  --accent-hover: #33DCFF;
  --chip-bg: #00D2FF;
  --bg-1: #0a0a0c;
  --bg-2: #121316;
  --bg-3: #1a1c20;
  --line: #25272c;
  --line-soft: #1a1c20;
  --fg: #ffffff;
  --fg-dim: #b6b9c0;
  --fg-muted: #76797f;
  --accent-fg: #00161e;
  --accent-soft: rgba(0, 210, 255, 0.10);
  --accent-line: rgba(0, 210, 255, 0.35);
  --success: #4ade80;
  --chip-fg: #00161e;
  --card: #14161a;
  --card-hover: #1a1d22;
  --shadow-card: 0 1px 0 rgba(255,255,255,0.04) inset, 0 8px 24px -8px rgba(0,0,0,0.6);
}

html[data-theme="light"] {
  --bg: #ffffff;
  --bg-1: #f6f7f9;
  --bg-2: #eef0f3;
  --bg-3: #e6e8ec;
  --line: #d8dbe0;
  --line-soft: #e8eaee;
  --fg: #0a0b0d;
  --fg-dim: #494c52;
  --fg-muted: #8a8e95;
  --accent: #007ea8;
  --accent-hover: #0095c8;
  --accent-fg: #ffffff;
  --accent-soft: rgba(0, 126, 168, 0.08);
  --accent-line: rgba(0, 126, 168, 0.30);
  --success: #16a34a;
  --chip-bg: #00c2ff;
  --chip-fg: #00161e;
  --card: #ffffff;
  --card-hover: #f6f7f9;
  --shadow-card: 0 1px 2px rgba(10,11,13,0.04), 0 8px 24px -12px rgba(10,11,13,0.10);
}

/* RESET */

*, *::before, *::after { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--fg);
  font-family: var(--font-sans);
  font-size: 16px;
  line-height: 1.65;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  transition: background 200ms var(--ease), color 200ms var(--ease);
}
a { color: inherit; text-decoration: none; }
button { font: inherit; color: inherit; background: none; border: 0; cursor: pointer; }
.mono { font-family: var(--font-mono); letter-spacing: 0.01em; }

/* ============= TOP NAV ============= */

.topbar {
  position: sticky; top: 0; z-index: 50;
  height: var(--nav-h);
  background: var(--bg);
  border-bottom: 1px solid var(--line);
}
.topbar-inner {
  height: 100%;
  padding: 0 28px;
  display: grid;
  grid-template-columns: auto 1fr auto;
  align-items: center;
  gap: 32px;
}
.brand {
  display: flex; align-items: center; gap: 14px;
  font-family: var(--font-display);
}
.brand-word {
  font-weight: 700;
  font-size: 22px;
  letter-spacing: -0.04em;
  color: var(--fg);
}
.brand-word em { font-style: normal; color: var(--accent); }
.brand-divider { width: 1px; height: 18px; background: var(--line); }
.brand-context {
  font-size: 13px;
  color: var(--fg-muted);
  letter-spacing: 0.02em;
}

.topnav {
  display: flex; gap: 4px;
  justify-self: center;
}
.topnav a {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 14px;
  font-size: 13.5px;
  color: var(--fg-dim);
  border-radius: var(--r-pill);
  transition: color 120ms var(--ease), background 120ms var(--ease);
}
.topnav a:hover { color: var(--fg); background: var(--bg-2); }
.topnav a.active { color: var(--fg); background: var(--bg-2); }
.topnav a svg { opacity: 0.6; }

.top-actions { display: flex; align-items: center; gap: 8px; }
.search {
  display: inline-flex; align-items: center; gap: 10px;
  padding: 8px 14px;
  border: 1px solid var(--line);
  border-radius: var(--r-pill);
  color: var(--fg-muted);
  font-size: 13px;
  min-width: 240px;
  background: var(--bg-1);
  transition: border-color 120ms var(--ease);
}
.search:hover { border-color: var(--fg-muted); color: var(--fg-dim); }
.search kbd {
  margin-left: auto;
  font-family: var(--font-mono);
  font-size: 10.5px;
  padding: 1px 6px;
  border: 1px solid var(--line);
  border-radius: 4px;
  color: var(--fg-muted);
}

.btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 9px 18px;
  font-size: 13px;
  font-weight: 500;
  border-radius: var(--r-pill);
  transition: transform 120ms var(--ease), background 120ms var(--ease), color 120ms var(--ease);
  white-space: nowrap;
}
.btn-ghost { color: var(--fg); background: transparent; border: 1px solid var(--line); }
.btn-ghost:hover { background: var(--bg-2); border-color: var(--fg-muted); }
.btn-primary { background: var(--accent); color: var(--accent-fg); }
.btn-primary:hover { background: var(--accent-hover); transform: translateY(-1px); }
.btn-primary.full { width: 100%; justify-content: center; padding: 12px 18px; }

/* ============= APP SHELL ============= */

.shell {
  display: grid;
  grid-template-columns: var(--left-w) minmax(0, 1fr) var(--right-w);
  min-height: calc(100vh - var(--nav-h));
  transition: grid-template-columns 260ms var(--ease);
}
.shell.collapsed {
  grid-template-columns: var(--left-w-collapsed) minmax(0, 1fr) var(--right-w);
}

/* ============= LEFT NAV (TOC / playbook map) ============= */

.leftnav {
  position: sticky; top: var(--nav-h);
  align-self: start;
  height: calc(100vh - var(--nav-h));
  border-right: 1px solid var(--line);
  display: flex; flex-direction: column;
  background: var(--bg);
  overflow: hidden;
  transition: width 260ms var(--ease);
}
.leftnav-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 18px 18px 14px 22px;
  border-bottom: 1px solid var(--line-soft);
  min-height: 56px;
}
.leftnav-eyebrow {
  font-family: var(--font-mono);
  font-size: 10.5px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--fg-muted);
}
.leftnav-collapse {
  width: 28px; height: 28px;
  display: inline-flex; align-items: center; justify-content: center;
  color: var(--fg-muted);
  border-radius: var(--r-sm);
  border: 1px solid var(--line);
  transition: all 120ms var(--ease);
}
.leftnav-collapse:hover { color: var(--fg); border-color: var(--fg-muted); background: var(--bg-2); }
.leftnav-collapse svg { transition: transform 200ms var(--ease); }

.leftnav-body {
  flex: 1;
  overflow-y: auto;
  padding: 16px 12px 24px 12px;
  display: flex; flex-direction: column; gap: 4px;
  scrollbar-width: thin;
  scrollbar-color: var(--bg-3) transparent;
}
.leftnav-body::-webkit-scrollbar { width: 6px; }
.leftnav-body::-webkit-scrollbar-thumb { background: var(--bg-3); border-radius: 99px; }

.toc-section { margin-top: 14px; }
.toc-section:first-child { margin-top: 0; }
.toc-section-title {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 12px 6px 12px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--fg-muted);
}
.toc-num {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--fg-muted);
  width: 18px;
  flex-shrink: 0;
}

.toc-link {
  display: flex; align-items: center; gap: 10px;
  padding: 7px 12px;
  font-size: 13.5px;
  color: var(--fg-dim);
  border-radius: var(--r-sm);
  position: relative;
  transition: color 100ms var(--ease), background 100ms var(--ease);
  line-height: 1.35;
}
.toc-link .toc-num { color: var(--fg-muted); }
.toc-link:hover { color: var(--fg); background: var(--bg-2); }
.toc-link.active {
  color: var(--fg);
  background: var(--accent-soft);
  font-weight: 500;
}
.toc-link.active .toc-num { color: var(--accent); }

/* Collapsed state — show only first letter / number chips */
.shell.collapsed .leftnav-eyebrow,
.shell.collapsed .toc-section-title,
.shell.collapsed .toc-link span.label { display: none; }
.shell.collapsed .leftnav-head { padding: 18px 12px 14px 12px; justify-content: center; }
.shell.collapsed .leftnav-collapse svg { transform: rotate(180deg); }
.shell.collapsed .leftnav-body { padding: 12px 8px; align-items: center; }
.shell.collapsed .toc-link {
  width: 32px; height: 32px;
  padding: 0;
  justify-content: center;
  border-radius: var(--r-sm);
  font-family: var(--font-mono);
  font-size: 11px;
}
.shell.collapsed .toc-link .toc-num { width: auto; text-align: center; }
.shell.collapsed .toc-section { margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--line-soft); }
.shell.collapsed .toc-section:first-child { border-top: 0; padding-top: 0; }

/* Tooltip when collapsed */
.shell.collapsed .toc-link:hover::after {
  content: attr(data-tip);
  position: absolute;
  left: calc(100% + 12px);
  top: 50%; transform: translateY(-50%);
  background: var(--bg-3);
  color: var(--fg);
  font-family: var(--font-sans);
  font-size: 12px;
  padding: 6px 10px;
  border-radius: var(--r-sm);
  border: 1px solid var(--line);
  white-space: nowrap;
  z-index: 60;
  pointer-events: none;
}

/* Mini reopen tab when fully hidden (not used here — collapse is preferred) */

/* ============= MAIN CONTENT ============= */

main { min-width: 0; }
.content {
  max-width: 760px;
  margin: 0 auto;
  padding: 56px 56px 96px;
}

.crumbs {
  display: flex; align-items: center; gap: 8px;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--fg-muted);
  text-transform: uppercase;
  letter-spacing: 0.12em;
  margin-bottom: 28px;
}
.crumbs a:hover { color: var(--fg); }
.crumbs .sep { color: var(--fg-muted); opacity: 0.6; }

.eyebrow-row {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 18px;
}
.chip-num {
  display: inline-flex; align-items: center; justify-content: center;
  width: 28px; height: 28px;
  background: var(--chip-bg);
  color: var(--chip-fg);
  border-radius: var(--r-sm);
  font-family: var(--font-mono);
  font-weight: 600;
  font-size: 13px;
}
.eyebrow-text {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--fg-muted);
}

h1.page-title {
  font-family: var(--font-display);
  font-size: 56px;
  font-weight: 700;
  letter-spacing: -0.04em;
  line-height: 1.02;
  margin: 0 0 20px 0;
  color: var(--fg);
  text-wrap: balance;
}
h1.page-title em { font-style: normal; color: var(--accent); }

.page-dek {
  font-size: 19px;
  line-height: 1.5;
  color: var(--fg-dim);
  margin: 0 0 36px 0;
  max-width: 60ch;
  text-wrap: pretty;
}

.byline {
  display: flex; align-items: center; gap: 14px;
  padding: 14px 0 28px 0;
  border-bottom: 1px solid var(--line-soft);
  margin-bottom: 40px;
  flex-wrap: wrap;
}
.avatar-stack { display: flex; }
.avatar {
  width: 26px; height: 26px;
  border-radius: 99px;
  background: var(--bg-3);
  border: 1px solid var(--line);
  color: var(--fg-dim);
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 9.5px; font-weight: 600;
  letter-spacing: 0.05em;
}
.avatar + .avatar { margin-left: -8px; }
.byline-info { font-size: 13px; color: var(--fg-dim); }
.byline-info b { color: var(--fg); font-weight: 500; }
.byline-meta {
  margin-left: auto;
  display: flex; gap: 18px;
  font-family: var(--font-mono);
  font-size: 10.5px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--fg-muted);
}

/* Hero feature card — matches BRINC card style */
.hero-card {
  position: relative;
  border-radius: 16px;
  background: var(--card);
  border: 1px solid var(--line);
  overflow: hidden;
  margin-bottom: 48px;
  box-shadow: var(--shadow-card);
  aspect-ratio: 3 / 2;
}
.hero-card .hero-img {
  display: block;
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center 35%;
}

/* Theme switcher in topbar */
.theme-switcher {
  display: inline-flex;
  background: var(--bg-1);
  border: 1px solid var(--line);
  border-radius: var(--r-pill);
  padding: 3px;
  gap: 2px;
}
.ts-opt {
  position: relative;
  width: 30px; height: 28px;
  display: inline-flex; align-items: center; justify-content: center;
  color: var(--fg-muted);
  border-radius: var(--r-pill);
  transition: all 120ms var(--ease);
}
.ts-opt:hover { color: var(--fg); }
.ts-opt.active {
  background: var(--accent);
  color: var(--accent-fg);
}
/* Custom tooltip — appears only on hover, not on focus */
.ts-opt[data-tip]::after {
  content: attr(data-tip);
  position: absolute;
  top: calc(100% + 8px);
  left: 50%;
  transform: translateX(-50%) translateY(-2px);
  background: var(--bg-1);
  color: var(--fg);
  border: 1px solid var(--line);
  border-radius: 6px;
  padding: 5px 9px;
  font-size: 11px;
  font-family: var(--font-body);
  font-weight: 500;
  white-space: nowrap;
  pointer-events: none;
  opacity: 0;
  transition: opacity 140ms var(--ease), transform 140ms var(--ease);
  z-index: 50;
  box-shadow: 0 6px 16px rgba(0,0,0,0.25);
}
.ts-opt:hover[data-tip]::after {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}
.hero-tag {
  position: absolute; top: 18px; left: 18px;
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--fg);
  background: rgba(0,0,0,0.5);
  padding: 6px 10px;
  border-radius: var(--r-pill);
  backdrop-filter: blur(8px);
}
html[data-theme="light"] .hero-tag { background: rgba(255,255,255,0.7); color: var(--fg); }
.hero-caption {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--fg-muted);
  letter-spacing: 0.1em;
  text-transform: uppercase;
}

/* Prose */
section.section { margin-bottom: 56px; scroll-margin-top: calc(var(--nav-h) + 24px); }
.section-head {
  display: flex; align-items: baseline; gap: 12px;
  margin-bottom: 20px;
}
.section-num {
  font-family: var(--font-mono);
  font-size: 14px;
  font-weight: 500;
  color: var(--accent);
  letter-spacing: -0.02em;
}
h2.section-title {
  font-family: var(--font-display);
  font-size: 32px;
  font-weight: 700;
  letter-spacing: -0.025em;
  line-height: 1.15;
  margin: 0;
  color: var(--fg);
}
h3.subsection {
  font-family: var(--font-display);
  font-size: 19px;
  font-weight: 600;
  letter-spacing: -0.015em;
  margin: 36px 0 12px 0;
  color: var(--fg);
  scroll-margin-top: calc(var(--nav-h) + 24px);
}
.prose p {
  margin: 0 0 16px 0;
  color: var(--fg-dim);
  font-size: 16px;
  line-height: 1.7;
  text-wrap: pretty;
}
.prose strong { color: var(--fg); font-weight: 600; }
.prose em { color: var(--fg); font-style: italic; }

.prose ul.bullets {
  list-style: none; padding: 0; margin: 12px 0 20px 0;
  display: flex; flex-direction: column; gap: 10px;
}
.prose ul.bullets li {
  position: relative;
  padding-left: 22px;
  color: var(--fg-dim);
  font-size: 15px;
  line-height: 1.6;
}
.prose ul.bullets li::before {
  content: "";
  position: absolute;
  left: 0; top: 9px;
  width: 12px; height: 2px;
  background: var(--accent);
}

/* Capability cards (BRINC pill-row style) */
.cap-list {
  display: flex; flex-direction: column; gap: 10px;
  margin: 20px 0 24px 0;
}
.cap-row {
  display: grid;
  grid-template-columns: 1fr auto;
  align-items: center;
  gap: 14px;
  padding: 14px 16px 14px 18px;
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: 14px;
  transition: background 120ms var(--ease), border-color 120ms var(--ease);
}
.cap-row:hover { background: var(--card-hover); border-color: var(--accent-line); }
.cap-row-left { display: flex; align-items: center; gap: 14px; min-width: 0; }
.cap-icon {
  width: 34px; height: 34px;
  background: var(--chip-bg);
  color: var(--chip-fg);
  border-radius: 8px;
  display: inline-flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.cap-title { font-family: var(--font-display); font-weight: 600; font-size: 17px; color: var(--fg); letter-spacing: -0.01em; }
.cap-meta { font-family: var(--font-mono); font-size: 11px; color: var(--fg-muted); letter-spacing: 0.06em; }

/* Stat block */
.stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 24px;
  padding: 32px 4px;
  margin: 24px 0 32px;
  border-top: 1px solid var(--line);
  border-bottom: 1px solid var(--line);
}
.stat { display: flex; flex-direction: column; gap: 6px; }
.stat-num {
  font-family: var(--font-display);
  font-size: 48px;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: -0.04em;
  line-height: 1;
  font-variant-numeric: tabular-nums;
}
.stat-num .unit { font-size: 18px; color: var(--accent); margin-left: 2px; opacity: 0.85; }
.stat-num .pre { font-size: 24px; vertical-align: 6px; margin-right: 2px; opacity: 0.7; }
.stat-label { font-size: 13px; color: var(--fg); font-weight: 500; }
.stat-sub { font-size: 12px; color: var(--fg-muted); line-height: 1.4; }

/* Callout */
.callout {
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 16px;
  padding: 16px 20px;
  background: var(--accent-soft);
  border: 1px solid var(--accent-line);
  border-radius: 12px;
  margin: 24px 0;
}
.callout-tag {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.16em;
  font-weight: 600;
  color: var(--accent);
  padding: 4px 0;
}
.callout-body { color: var(--fg); font-size: 14.5px; line-height: 1.6; }

/* Code */
.codeblock {
  border: 1px solid var(--line);
  border-radius: 12px;
  overflow: hidden;
  background: var(--bg-1);
  margin: 20px 0 24px 0;
}
.code-head {
  display: flex; justify-content: space-between; align-items: center;
  padding: 10px 14px;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--fg-muted);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  background: var(--bg);
  border-bottom: 1px solid var(--line);
}
.code-copy { color: var(--fg-muted); cursor: pointer; }
.code-copy:hover { color: var(--accent); }
.codeblock pre {
  margin: 0;
  padding: 16px 18px;
  font-family: var(--font-mono);
  font-size: 12.5px;
  line-height: 1.65;
  color: var(--fg-dim);
  overflow-x: auto;
}

/* Quote */
blockquote.pull {
  margin: 28px 0;
  padding: 4px 0 4px 20px;
  border-left: 2px solid var(--accent);
}
blockquote.pull p {
  font-family: var(--font-display);
  font-size: 22px;
  line-height: 1.35;
  font-weight: 500;
  color: var(--fg);
  letter-spacing: -0.015em;
  margin: 0 0 10px 0;
}
blockquote.pull footer {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--fg-muted);
  letter-spacing: 0.08em;
}

/* Next-section pager (bottom right per wireframe) */
.next-section {
  position: relative;
  margin-top: 80px;
  padding-top: 32px;
  border-top: 1px solid var(--line);
}
.next-section-row {
  display: flex; justify-content: flex-end;
}
.next-link {
  display: inline-flex; align-items: center; gap: 16px;
  padding: 18px 22px;
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: 14px;
  min-width: 320px;
  transition: all 150ms var(--ease);
}
.next-link:hover { border-color: var(--accent); background: var(--card-hover); }
.next-link-text { display: flex; flex-direction: column; gap: 4px; }
.next-link .next-eyebrow {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.14em;
  color: var(--fg-muted);
  text-transform: uppercase;
}
.next-link .next-title {
  font-family: var(--font-display);
  font-size: 17px;
  font-weight: 600;
  color: var(--fg);
  letter-spacing: -0.01em;
}
.next-link-arrow {
  margin-left: auto;
  width: 36px; height: 36px;
  border-radius: 99px;
  background: var(--accent);
  color: var(--accent-fg);
  display: inline-flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: transform 200ms var(--ease);
}
.next-link:hover .next-link-arrow { transform: translateX(4px); }

/* ============= RIGHT RAIL ============= */

.rightrail {
  position: sticky; top: var(--nav-h);
  align-self: start;
  height: calc(100vh - var(--nav-h));
  border-left: 1px solid var(--line);
  padding: 32px 24px;
  overflow-y: auto;
  display: flex; flex-direction: column; gap: 28px;
  background: var(--bg);
}
.rr-section .rr-label {
  font-family: var(--font-mono);
  font-size: 10.5px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--fg-muted);
  margin-bottom: 14px;
}

.section-nav-wrap {
  position: relative;
  border-left: 1px solid var(--line);
}
.section-nav-slider {
  position: absolute;
  left: -1px;
  top: 0;
  width: 2px;
  background: var(--accent);
  border-radius: 2px;
  transition: transform 320ms cubic-bezier(.4,0,.2,1), height 320ms cubic-bezier(.4,0,.2,1), opacity 200ms var(--ease);
  pointer-events: none;
  box-shadow: 0 0 8px var(--accent);
}
.section-nav {
  list-style: none; padding: 0; margin: 0;
  position: relative;
}
.section-nav li a {
  display: block;
  padding: 6px 14px;
  font-size: 13px;
  color: var(--fg-dim);
  line-height: 1.4;
  transition: color 120ms var(--ease);
}
.section-nav li a:hover { color: var(--fg); }
.section-nav li.active a {
  color: var(--accent);
  font-weight: 500;
}
.section-nav li.depth-2 a { padding-left: 24px; font-size: 12.5px; }

/* CTA */
.cta-card {
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: 12px;
  padding: 22px 18px 18px 18px;
  text-align: center;
}
.cta-eyebrow {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 10px;
}
.cta-title {
  font-family: var(--font-display);
  font-size: 18px;
  font-weight: 600;
  color: var(--fg);
  letter-spacing: -0.01em;
  line-height: 1.2;
  margin: 0 auto 10px;
  white-space: nowrap;
}
.cta-body {
  font-size: 12.5px;
  color: var(--fg-dim);
  line-height: 1.55;
  margin: 0 auto 14px;
  max-width: 28ch;
  text-wrap: balance;
}
.cta-card .btn.full {
  justify-content: center;
}

/* Right-rail "Next chapter" pager — sticks below the CTA, always visible */
.rr-next {
  margin-top: auto; /* push to the bottom of the rail */
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 14px 14px 16px;
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: 12px;
  text-decoration: none;
  color: var(--fg);
  transition: all 150ms var(--ease);
}
.rr-next:hover {
  border-color: var(--accent);
  background: var(--card-hover);
}
.rr-next-text {
  display: flex;
  flex-direction: column;
  gap: 3px;
  min-width: 0;
  flex: 1;
}
.rr-next-eyebrow {
  font-family: var(--font-mono);
  font-size: 9.5px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--fg-muted);
}
.rr-next-title {
  font-family: var(--font-display);
  font-size: 13.5px;
  font-weight: 600;
  color: var(--fg);
  letter-spacing: -0.005em;
  line-height: 1.25;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.rr-next-arrow {
  flex-shrink: 0;
  width: 30px;
  height: 30px;
  border-radius: 999px;
  background: var(--accent);
  color: var(--accent-fg);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  transition: transform 200ms var(--ease);
}
.rr-next:hover .rr-next-arrow { transform: translateX(3px); }

/* Stubbed (non-clickable) TOC entries — visible but inert */
.toc-link.is-stub {
  cursor: default;
}
.toc-link.is-stub:hover {
  /* keep the same hover highlight as real links so users see the structure;
     just don't move the cursor or imply a click target via underline */
  color: var(--fg);
  background: var(--bg-2);
}

/* Theme switcher block (per wireframe — sits below CTA) */
.theme-switch {
  padding-top: 8px;
}
.theme-switch-label {
  font-family: var(--font-mono);
  font-size: 10.5px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--fg-muted);
  margin-bottom: 10px;
}
.theme-switch-help {
  font-size: 12px;
  color: var(--fg-muted);
  line-height: 1.45;
  margin-bottom: 12px;
}
.theme-segment {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  background: var(--bg-1);
  border: 1px solid var(--line);
  border-radius: var(--r-pill);
  padding: 3px;
  gap: 2px;
}
.theme-opt {
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  padding: 7px 6px;
  font-size: 11.5px;
  color: var(--fg-muted);
  border-radius: var(--r-pill);
  transition: all 120ms var(--ease);
  font-weight: 500;
}
.theme-opt svg { width: 13px; height: 13px; }
.theme-opt:hover { color: var(--fg); }
.theme-opt.active {
  background: var(--accent);
  color: var(--accent-fg);
}

/* ============= TWEAKS PANEL ============= */
.tweaks-panel {
  position: fixed;
  bottom: 24px; right: 24px;
  width: 300px;
  background: var(--bg-1);
  border: 1px solid var(--line);
  border-radius: 14px;
  padding: 18px;
  z-index: 200;
  box-shadow: 0 24px 48px -16px rgba(0,0,0,0.5);
}
.tweaks-head {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 14px;
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--fg-muted);
}
.tweaks-row { margin-bottom: 14px; }
.tweaks-row > .label { display: block; font-size: 11px; color: var(--fg-dim); margin-bottom: 6px; }
.tweaks-seg {
  display: grid;
  grid-auto-flow: column;
  grid-auto-columns: 1fr;
  gap: 4px;
  background: var(--bg);
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 3px;
}
.tweaks-opt {
  padding: 6px 8px;
  font-size: 11.5px;
  color: var(--fg-muted);
  border-radius: 6px;
  text-align: center;
}
.tweaks-opt:hover { color: var(--fg); }
.tweaks-opt.active { background: var(--accent); color: var(--accent-fg); }

/* ============= RESPONSIVE ============= */

@media (max-width: 1240px) {
  .shell { grid-template-columns: var(--left-w) minmax(0, 1fr); }
  .shell.collapsed { grid-template-columns: var(--left-w-collapsed) minmax(0, 1fr); }
  .rightrail { display: none; }
  .content { padding: 48px 40px 80px; }
}
@media (max-width: 880px) {
  .shell { grid-template-columns: 1fr; }
  .shell.collapsed { grid-template-columns: 1fr; }
  .leftnav { display: none; }
  .topnav { display: none; }
  .search { min-width: 0; }
  .search span { display: none; }
  .content { padding: 32px 22px 64px; }
  h1.page-title { font-size: 38px; }
  .stats { grid-template-columns: 1fr; gap: 16px; }
}

/* ============= SEARCH OVERLAY ============= */

.search-overlay {
  position: fixed; inset: 0;
  z-index: 200;
  display: flex; align-items: flex-start; justify-content: center;
  padding: 80px 24px 24px;
  animation: searchFadeIn 180ms var(--ease) both;
}
@keyframes searchFadeIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}
.search-backdrop {
  position: absolute; inset: 0;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(8px);
}
html[data-theme="light"] .search-backdrop {
  background: rgba(20,30,40,0.45);
}
.search-panel {
  position: relative;
  width: min(820px, 100%);
  max-height: calc(100vh - 120px);
  background: var(--bg-1);
  border: 1px solid var(--line);
  border-radius: 16px;
  box-shadow: 0 24px 80px rgba(0,0,0,0.5);
  display: flex; flex-direction: column;
  overflow: hidden;
  animation: searchPopIn 220ms var(--ease) both;
}
@keyframes searchPopIn {
  from { opacity: 0; transform: translateY(-8px) scale(0.985); }
  to   { opacity: 1; transform: none; }
}

/* Search bar (input row at the top of the panel) */
.search-bar {
  display: flex; align-items: center; gap: 10px;
  padding: 14px 14px 14px 18px;
  border-bottom: 1px solid var(--line);
  background: var(--bg);
}
.search-bar-icon {
  display: inline-flex;
  color: var(--accent);
}
.search-bar input {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  font-family: var(--font-body);
  font-size: 16px;
  color: var(--fg);
  padding: 8px 4px;
}
.search-bar input::placeholder {
  color: var(--fg-muted);
}
.search-bar-go {
  background: var(--accent);
  color: var(--accent-fg);
  border: none;
  border-radius: var(--r-pill);
  padding: 8px 16px;
  font-family: var(--font-body);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: background 120ms var(--ease);
}
.search-bar-go:hover {
  background: var(--accent-hover);
}
.search-bar-close {
  width: 32px; height: 32px;
  display: inline-flex; align-items: center; justify-content: center;
  background: transparent;
  color: var(--fg-muted);
  border: 1px solid var(--line);
  border-radius: 8px;
  cursor: pointer;
  transition: all 120ms var(--ease);
}
.search-bar-close:hover {
  color: var(--fg);
  background: var(--bg-2);
  border-color: var(--fg-muted);
}

/* Body — switches between hint / loading / results */
.search-body {
  flex: 1;
  overflow-y: auto;
  padding: 24px;
  min-height: 280px;
}

/* Hint state */
.search-hint {
  display: flex; flex-direction: column; gap: 14px;
}
.search-hint-eyebrow {
  font-family: var(--font-mono);
  font-size: 10.5px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--fg-muted);
}
.search-hint-row {
  display: flex; flex-wrap: wrap; gap: 8px;
}
.search-chip {
  background: var(--bg-2);
  color: var(--fg);
  border: 1px solid var(--line);
  border-radius: var(--r-pill);
  padding: 7px 13px;
  font-family: var(--font-body);
  font-size: 13px;
  cursor: pointer;
  transition: all 120ms var(--ease);
}
.search-chip:hover {
  border-color: var(--accent);
  color: var(--accent);
  background: var(--accent-soft);
}
.search-hint-foot {
  margin-top: 8px;
  font-size: 12.5px;
  color: var(--fg-muted);
}
.search-hint-foot kbd {
  display: inline-block;
  padding: 1px 6px;
  font-family: var(--font-mono);
  font-size: 11px;
  background: var(--bg-2);
  border: 1px solid var(--line);
  border-radius: 4px;
  color: var(--fg-dim);
  margin: 0 2px;
}

/* Loading state */
.search-loading {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 18px;
  padding: 60px 20px;
  color: var(--fg-muted);
}
.search-spinner {
  width: 40px; height: 40px;
  border: 3px solid var(--line);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: searchSpin 0.85s linear infinite;
}
@keyframes searchSpin {
  to { transform: rotate(360deg); }
}
.search-loading-text {
  font-size: 14px;
  letter-spacing: 0.01em;
}
.search-loading-text em {
  color: var(--fg);
  font-style: normal;
  font-weight: 500;
}

/* Results state */
.search-results {
  display: flex; flex-direction: column; gap: 16px;
}
.search-results-meta {
  display: flex; align-items: baseline; gap: 8px;
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--fg-muted);
}
.search-results-query {
  color: var(--fg);
  font-family: var(--font-body);
  font-size: 13px;
  letter-spacing: normal;
  text-transform: none;
}
.search-empty {
  padding: 32px;
  text-align: center;
  color: var(--fg-muted);
  font-size: 14px;
  border: 1px dashed var(--line);
  border-radius: 12px;
}
.search-result-grid {
  display: flex; flex-direction: column; gap: 12px;
}
.search-result {
  display: grid;
  grid-template-columns: 140px 1fr auto;
  align-items: stretch;
  gap: 18px;
  padding: 14px;
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: 12px;
  text-decoration: none;
  color: var(--fg);
  transition: all 180ms var(--ease);
  animation: searchResultIn 280ms var(--ease) both;
}
.search-result:nth-child(1) { animation-delay: 40ms; }
.search-result:nth-child(2) { animation-delay: 120ms; }
@keyframes searchResultIn {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: none; }
}
.search-result:hover {
  border-color: var(--accent);
  background: var(--card-hover);
}
.search-result-media {
  width: 140px;
  aspect-ratio: 4 / 3;
  overflow: hidden;
  border-radius: 8px;
  background: var(--bg-2);
  flex-shrink: 0;
}
.search-result-media img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}
.search-result-body {
  display: flex; flex-direction: column;
  gap: 6px;
  min-width: 0;
}
.search-result-eyebrow {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--accent);
}
.search-result-title {
  font-family: var(--font-display);
  font-size: 19px;
  font-weight: 600;
  letter-spacing: -0.01em;
  color: var(--fg);
  line-height: 1.2;
}
.search-result-blurb {
  font-size: 13.5px;
  line-height: 1.5;
  color: var(--fg-dim);
  margin: 0;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.search-result-tags {
  display: flex; flex-wrap: wrap; gap: 6px;
  margin-top: 4px;
}
.search-tag {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 3px 8px;
  border-radius: 99px;
  background: var(--bg-2);
  color: var(--fg-muted);
  border: 1px solid var(--line);
}
.search-result-arrow {
  align-self: center;
  flex-shrink: 0;
  width: 36px; height: 36px;
  border-radius: 999px;
  background: var(--bg-2);
  color: var(--fg-muted);
  display: inline-flex; align-items: center; justify-content: center;
  transition: all 200ms var(--ease);
}
.search-result:hover .search-result-arrow {
  background: var(--accent);
  color: var(--accent-fg);
  transform: translateX(4px);
}

@media (max-width: 640px) {
  .search-overlay { padding: 40px 12px 12px; }
  .search-result { grid-template-columns: 96px 1fr; }
  .search-result-media { width: 96px; }
  .search-result-arrow { display: none; }
}


/* ============= TYPOGRAPHY OVERRIDES =============
   - Manrope replaces Inter (body) and Inter Tight (display)
   - Conthrax (Brinc's actual logo face) is used ONLY for the brand wordmark
   - JetBrains Mono is unchanged for eyebrows / code
*/

:root {
  --font-sans: "Manrope", "Helvetica Neue", system-ui, -apple-system, sans-serif;
  --font-display: "Manrope", "Helvetica Neue", system-ui, -apple-system, sans-serif;
  --font-brand: "Conthrax", "Conthrax SemiBold", "Orbitron", "Manrope", system-ui, sans-serif;
}

/* ============= REAL BRINC HEADER ============= */

/* Brand wordmark uses Conthrax — the actual BRINC logo typeface.
   It's a wide geometric face, so we tighten the letter-spacing
   and bump the size a touch so visual weight matches the original. */
.topbar-real .brand-word {
  font-family: var(--font-brand);
  font-weight: 600;
  font-size: 22px;
  letter-spacing: -0.02em;
  color: var(--fg);
  text-transform: lowercase;
}

.topbar-real .topnav a {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 14px;
  font-size: 13.5px;
  color: var(--fg-dim);
  border-radius: var(--r-pill);
  transition: color 120ms var(--ease), background 120ms var(--ease);
  cursor: pointer;
}
.topbar-real .topnav a svg { opacity: 0.55; transition: transform 120ms var(--ease), opacity 120ms var(--ease); }
.topbar-real .topnav a:hover { color: var(--fg); background: var(--bg-2); }
.topbar-real .topnav a:hover svg { opacity: 1; transform: translateY(1px); }
.topbar-real .topnav a.active { color: var(--fg); background: var(--bg-2); }

/* Search button (icon-only — opens the modal) */
.search-trigger {
  position: relative;
  width: 36px; height: 36px;
  display: inline-flex; align-items: center; justify-content: center;
  color: var(--fg-dim);
  background: var(--bg-1);
  border: 1px solid var(--line);
  border-radius: var(--r-pill);
  transition: color 120ms var(--ease), background 120ms var(--ease), border-color 120ms var(--ease);
}
.search-trigger:hover { color: var(--fg); border-color: var(--fg-muted); background: var(--bg-2); }
.search-trigger[data-tip]::after {
  content: attr(data-tip);
  position: absolute;
  top: calc(100% + 8px); left: 50%;
  transform: translateX(-50%) translateY(-2px);
  background: var(--bg-1);
  color: var(--fg);
  border: 1px solid var(--line);
  border-radius: 6px;
  padding: 5px 9px;
  font-size: 11px; font-family: var(--font-sans); font-weight: 500;
  white-space: nowrap; pointer-events: none;
  opacity: 0;
  transition: opacity 140ms var(--ease), transform 140ms var(--ease);
  z-index: 50;
  box-shadow: 0 6px 16px rgba(0,0,0,0.25);
}
.search-trigger:hover[data-tip]::after { opacity: 1; transform: translateX(-50%) translateY(0); }

.theme-toggle {
  position: relative;
  width: 36px; height: 36px;
  display: inline-flex; align-items: center; justify-content: center;
  color: var(--fg-dim);
  background: var(--bg-1);
  border: 1px solid var(--line);
  border-radius: var(--r-pill);
  transition: color 120ms var(--ease), background 120ms var(--ease), border-color 120ms var(--ease);
}
.theme-toggle:hover { color: var(--fg); border-color: var(--fg-muted); background: var(--bg-2); }
.theme-toggle[data-tip]::after {
  content: attr(data-tip);
  position: absolute;
  top: calc(100% + 8px); left: 50%;
  transform: translateX(-50%) translateY(-2px);
  background: var(--bg-1);
  color: var(--fg);
  border: 1px solid var(--line);
  border-radius: 6px;
  padding: 5px 9px;
  font-size: 11px; font-family: var(--font-sans); font-weight: 500;
  white-space: nowrap; pointer-events: none;
  opacity: 0;
  transition: opacity 140ms var(--ease), transform 140ms var(--ease);
  z-index: 50;
  box-shadow: 0 6px 16px rgba(0,0,0,0.25);
}
.theme-toggle:hover[data-tip]::after { opacity: 1; transform: translateX(-50%) translateY(0); }

.topbar-real .top-actions { gap: 8px; }

/* ============= COLLAPSED LEFT NAV — minimal "rail" mode ============= */

.shell.collapsed .leftnav-body { display: none; }
.shell.collapsed .leftnav { padding: 0; }
.shell.collapsed .leftnav-head {
  padding: 12px;
  justify-content: center;
  border-bottom: 0;
  min-height: 0;
}
.shell.collapsed .toc-link,
.shell.collapsed .toc-section,
.shell.collapsed .toc-link .toc-num,
.shell.collapsed .toc-section-title {
  display: none !important;
}
:root { --left-w-collapsed: 44px; }
.shell.collapsed .content { max-width: 880px; padding: 56px 80px 96px; }
.shell.collapsed h1.page-title { font-size: 56px; }
.shell.collapsed .leftnav { border-right: 1px solid var(--line-soft); }

/* ============= V2: INLINE TOC ============= */

:root { --left-w-v2: 296px; }
.shell-v2 { grid-template-columns: var(--left-w-v2) minmax(0, 1fr) var(--right-w); }
.shell-v2.collapsed { grid-template-columns: var(--left-w-collapsed) minmax(0, 1fr) var(--right-w); }

.leftnav.v2 .toc-link.active.is-link {
  color: var(--fg);
  background: var(--accent-soft);
  font-weight: 500;
  border: 1px solid var(--accent-line);
}
.leftnav.v2 .toc-link.active.is-link .toc-num { color: var(--accent); }

.inline-toc {
  position: relative;
  margin: 4px 0 8px 18px;
  padding-left: 22px;
  border-left: 1px solid var(--line-soft);
}
.inline-toc-list {
  list-style: none; margin: 0; padding: 0;
  display: flex; flex-direction: column;
  position: relative;
  z-index: 1;
}
.inline-toc-list li { position: relative; font-size: 12.5px; line-height: 1.35; }
.inline-toc-list li a {
  display: block;
  padding: 6px 10px 6px 12px;
  border-radius: var(--r-sm);
  color: var(--fg-muted);
  transition: color 120ms var(--ease);
  position: relative;
}
.inline-toc-list li:hover a { color: var(--fg-dim); }
.inline-toc-list li.active a { color: var(--fg); font-weight: 500; }
.inline-toc-list li.depth-2 a { padding-left: 22px; font-size: 12px; }

.inline-toc-slider {
  position: absolute;
  left: -1px;
  width: 2px;
  background: var(--accent);
  border-radius: 2px;
  transition: transform 220ms var(--ease), height 220ms var(--ease), opacity 180ms var(--ease);
  z-index: 2;
}

.shell.collapsed .inline-toc { display: none; }
.shell-v2 .rightrail.v2 .rr-section.cta-card { margin-top: 0; }
html[data-theme="light"] .inline-toc { border-left-color: var(--line); }

/* ============= CTA PRIORITIES (SWAPPED) =============
   "Pilot DFR / Book a Program Review" = PRIMARY → cyan-filled, prominent card
   "Next chapter / LEMUR 2"             = SECONDARY → muted outline, no cyan circle
*/

/* Primary CTA — Pilot DFR card */
.rightrail .cta-card {
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: 12px;
  padding: 18px 18px 16px;
  box-shadow: var(--shadow-card);
}
.rightrail .cta-eyebrow {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--fg-muted);
}
.rightrail .cta-title {
  font-family: var(--font-display);
  font-size: 18px;
  font-weight: 700;
  color: var(--fg);
  letter-spacing: -0.01em;
  margin-top: 4px;
}
.rightrail .cta-body {
  font-size: 12.5px;
  color: var(--fg-dim);
  line-height: 1.55;
  margin: 8px 0 14px;
}
.rightrail .cta-card .btn-primary.full {
  background: var(--accent);
  color: var(--accent-fg);
  border: 0;
  padding: 11px 14px;
  font-size: 13px;
  font-weight: 600;
  border-radius: var(--r-pill);
}
.rightrail .cta-card .btn-primary.full:hover {
  background: var(--accent-hover);
  transform: translateY(-1px);
}
.rightrail .cta-card .btn-primary.full svg { opacity: 1; }

/* Secondary CTA — Next chapter pager (muted outline, NO cyan arrow circle) */
.rr-next {
  margin-top: auto;
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 14px 14px 16px;
  background: transparent;            /* was var(--card) */
  border: 1px solid var(--line-soft); /* softer than --line */
  border-radius: 12px;
  text-decoration: none;
  color: var(--fg-dim);               /* was --fg */
  transition: all 150ms var(--ease);
  box-shadow: none;
}
.rr-next:hover {
  border-color: var(--line);
  background: transparent;
  color: var(--fg);
}
.rr-next-eyebrow {
  font-family: var(--font-mono);
  font-size: 9.5px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--fg-muted);
  opacity: 0.8;
}
.rr-next-title {
  font-family: var(--font-display);
  font-size: 13px;
  font-weight: 500;            /* was 600 */
  color: var(--fg-dim);        /* was --fg */
  letter-spacing: -0.005em;
  line-height: 1.25;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.rr-next:hover .rr-next-title { color: var(--fg); }

.rr-next-arrow {
  flex-shrink: 0;
  width: 28px; height: 28px;
  border-radius: 999px;
  background: transparent;     /* was var(--accent) */
  color: var(--fg-muted);      /* was --accent-fg */
  border: 1px solid var(--line);
  display: inline-flex; align-items: center; justify-content: center;
  transition: transform 200ms var(--ease), color 150ms var(--ease), border-color 150ms var(--ease);
}
.rr-next:hover .rr-next-arrow {
  color: var(--fg);
  border-color: var(--fg-muted);
  transform: translateX(3px);
}

/* Light theme parity */
html[data-theme="light"] .rightrail .cta-card { border-color: var(--line); }
html[data-theme="light"] .rr-next { border-color: var(--line-soft); }

/* ============= CLICKABLE SECTION HEADS — copy deep link =============
   Hover: cursor + a subtle # anchor icon appears to the right of the title.
   Click: copies the URL with that section's #hash, shows a small toast.
*/

.section-head--linkable {
  cursor: pointer;
  position: relative;
  border-radius: 6px;
  transition: background 120ms var(--ease);
  user-select: none;
}
.section-head--linkable:hover { background: var(--bg-1); }
.section-head--linkable:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: 4px;
}

/* Anchor (#) glyph that appears on hover.
   We reach inside the head and append it as an ::after on the .section-title. */
.section-head--linkable .section-title { position: relative; }
.section-head--linkable .section-title::after {
  content: "";
  display: inline-block;
  width: 18px; height: 18px;
  margin-left: 10px;
  vertical-align: -3px;
  background-color: currentColor;
  -webkit-mask-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16' fill='none' stroke='black' stroke-width='1.6' stroke-linecap='round' stroke-linejoin='round'><path d='M6.5 9.5a3 3 0 0 0 4.2 0l2-2a3 3 0 0 0-4.2-4.2L7.5 4.3'/><path d='M9.5 6.5a3 3 0 0 0-4.2 0l-2 2a3 3 0 0 0 4.2 4.2l1-1'/></svg>");
          mask-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16' fill='none' stroke='black' stroke-width='1.6' stroke-linecap='round' stroke-linejoin='round'><path d='M6.5 9.5a3 3 0 0 0 4.2 0l2-2a3 3 0 0 0-4.2-4.2L7.5 4.3'/><path d='M9.5 6.5a3 3 0 0 0-4.2 0l-2 2a3 3 0 0 0 4.2 4.2l1-1'/></svg>");
  -webkit-mask-repeat: no-repeat; mask-repeat: no-repeat;
  -webkit-mask-position: center; mask-position: center;
  -webkit-mask-size: contain;    mask-size: contain;
  opacity: 0;
  color: var(--fg-muted);
  transform: translateY(2px);
  transition: opacity 140ms var(--ease), transform 140ms var(--ease), color 140ms var(--ease);
}
.section-head--linkable:hover .section-title::after,
.section-head--linkable:focus-visible .section-title::after {
  opacity: 1;
  transform: translateY(0);
}
.section-head--linkable:hover .section-title { color: var(--accent); }
.section-head--linkable:hover .section-title::after { color: var(--accent); }

/* The "Link copied" toast — floats near the click point, fades out */
.link-toast {
  position: fixed;
  z-index: 9999;
  display: inline-flex;
  align-items: center;
  gap: 7px;
  padding: 7px 12px;
  background: var(--bg-1);
  color: var(--fg);
  border: 1px solid var(--line);
  border-radius: var(--r-pill);
  font-family: var(--font-sans);
  font-size: 12px;
  font-weight: 500;
  white-space: nowrap;
  box-shadow: 0 8px 24px rgba(0,0,0,0.35);
  pointer-events: none;
  animation: link-toast-in 200ms var(--ease) both, link-toast-out 240ms var(--ease) 1.36s both;
}
.link-toast svg { color: var(--accent); }
@keyframes link-toast-in {
  from { opacity: 0; transform: translateY(-4px) scale(0.96); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}
@keyframes link-toast-out {
  from { opacity: 1; transform: translateY(0) scale(1); }
  to   { opacity: 0; transform: translateY(-4px) scale(0.96); }
}

</style>

// Theme + active-section helpers (shared across pages)

function applyTheme(theme) {
  const mode = theme === "system" ? window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light" : theme;
  document.documentElement.setAttribute("data-theme", mode);
}

// Re-apply on system change when theme === "system"
(function watchSystem() {
  const mq = window.matchMedia("(prefers-color-scheme: dark)");
  mq.addEventListener("change", () => {
    if ((localStorage.getItem("brinc-theme") || "system") === "system") {
      applyTheme("system");
    }
  });
})();
function useActiveSection(ids) {
  const [activeId, setActiveId] = React.useState(ids[0]);
  React.useEffect(() => {
    let raf = 0;
    const onScroll = () => {
      cancelAnimationFrame(raf);
      raf = requestAnimationFrame(() => {
        const offset = 140;
        // Pick the LAST section whose top has crossed the offset line.
        // If we're near the bottom of the page, jump to the last id.
        const docH = document.documentElement.scrollHeight;
        const winB = window.innerHeight + window.scrollY;
        if (docH - winB < 80) {
          setActiveId(ids[ids.length - 1]);
          return;
        }
        let current = ids[0];
        for (const id of ids) {
          const el = document.getElementById(id);
          if (!el) continue;
          if (el.getBoundingClientRect().top - offset <= 0) current = id;
        }
        setActiveId(current);
      });
    };
    onScroll();
    window.addEventListener("scroll", onScroll, {
      passive: true
    });
    window.addEventListener("resize", onScroll);
    return () => {
      window.removeEventListener("scroll", onScroll);
      window.removeEventListener("resize", onScroll);
      cancelAnimationFrame(raf);
    };
  }, [ids.join("|")]);
  return activeId;
}
window.applyTheme = applyTheme;
window.useActiveSection = useActiveSection;
